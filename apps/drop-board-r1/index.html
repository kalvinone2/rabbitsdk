<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=240, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Drop Board R1</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 240px;
        height: 282px;
        margin: 0;
        overflow: hidden;
        background: #e8edf0;
        color: #171b25;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        border: 4px solid #263142;
      }

      button {
        font: inherit;
      }

      main {
        width: 100%;
        height: 100%;
        padding: 8px;
      }

      .view {
        display: none;
        width: 100%;
        height: 100%;
      }

      .view.active {
        display: grid;
      }

      #setupView,
      #typesView,
      #detailView {
        grid-template-rows: auto 1fr auto;
        gap: 7px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 7px;
        min-width: 0;
      }

      h1 {
        margin: 0;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #171b25;
        font-size: 17px;
        line-height: 1;
      }

      .badge {
        min-width: 0;
        max-width: 82px;
        height: 22px;
        padding: 0 6px;
        border: 1px solid #9aa3ad;
        border-radius: 5px;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #263142;
        font-size: 10px;
        font-weight: 900;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .panel {
        min-height: 0;
        border: 1px solid #9aa3ad;
        border-radius: 7px;
        background: #ffffff;
        overflow: hidden;
      }

      .pinPanel {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 8px;
        padding: 10px;
      }

      .pinLabel {
        color: #4d5968;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .pinDisplay {
        height: 38px;
        border: 2px solid #263142;
        border-radius: 6px;
        background: #f8fafb;
        color: #171b25;
        display: grid;
        place-items: center;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: 4px;
      }

      .keypad,
      .typeGrid {
        display: grid;
        gap: 6px;
      }

      .keypad {
        grid-template-columns: repeat(3, 1fr);
      }

      .typeGrid {
        min-height: 0;
        grid-template-columns: repeat(2, 1fr);
        align-content: start;
        overflow-y: auto;
      }

      button {
        min-width: 0;
        height: 34px;
        border: 0;
        border-radius: 6px;
        background: #263142;
        color: #ffffff;
        font-size: 11px;
        font-weight: 900;
      }

      .key {
        height: 40px;
        border: 1px solid #6f7d8f;
        background: #ffffff;
        color: #171b25;
        font-size: 17px;
      }

      .key.primary {
        background: #ffb703;
        color: #171b25;
      }

      .typeButton {
        position: relative;
        height: 46px;
        padding: 7px 6px 5px;
        border: 2px solid #171b25;
        background: var(--type-color, #8a8178);
        color: #ffffff;
        box-shadow: 3px 3px 0 #171b25;
        display: grid;
        align-content: center;
        gap: 2px;
        text-align: left;
      }

      .typeButton.light {
        color: #171b25;
      }

      .typeName,
      .typeCount {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .typeName {
        font-size: 12px;
        line-height: 1;
      }

      .typeCount {
        opacity: 0.9;
        font-size: 9px;
        line-height: 1;
      }

      .backButton {
        width: 30px;
        height: 30px;
        border: 2px solid #171b25;
        background: #ffb703;
        color: #171b25;
        font-size: 16px;
        box-shadow: 2px 2px 0 #171b25;
      }

      .detailHead {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .items {
        min-height: 0;
        padding: 6px;
        overflow-y: auto;
      }

      .item {
        margin: 0 0 6px;
        padding: 7px;
        border: 1px solid #c9cfd6;
        border-left: 5px solid var(--type-color, #8a8178);
        border-radius: 6px;
        background: #f8fafb;
        color: #171b25;
        font-size: 11px;
        line-height: 1.18;
        word-break: break-word;
      }

      .itemTitle {
        display: block;
        margin-bottom: 2px;
        font-weight: 900;
      }

      .itemBody {
        color: #4d5968;
      }

      .item.empty {
        border-left-color: #9aa3ad;
        color: #4d5968;
      }

      .status {
        min-height: 13px;
        color: #4d5968;
        font-size: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="view active" id="setupView">
        <header>
          <h1>Drop Board</h1>
          <span class="badge">setup</span>
        </header>

        <section class="panel pinPanel">
          <div>
            <div class="pinLabel">PIN</div>
            <div class="pinDisplay" id="pinDisplay">----</div>
          </div>

          <div class="keypad" id="keypad">
            <button class="key" data-key="1">1</button>
            <button class="key" data-key="2">2</button>
            <button class="key" data-key="3">3</button>
            <button class="key" data-key="4">4</button>
            <button class="key" data-key="5">5</button>
            <button class="key" data-key="6">6</button>
            <button class="key" data-key="7">7</button>
            <button class="key" data-key="8">8</button>
            <button class="key" data-key="9">9</button>
            <button class="key" data-key="clear">C</button>
            <button class="key" data-key="0">0</button>
            <button class="key primary" data-key="back">&lt;</button>
          </div>
        </section>

        <footer>
          <div class="status" id="setupStatus">sin configurar</div>
        </footer>
      </section>

      <section class="view" id="typesView">
        <header>
          <h1>Tipos</h1>
          <span class="badge" id="typeBadge">0 drops</span>
        </header>

        <section class="typeGrid" id="types"></section>

        <footer>
          <div class="status" id="typesStatus">listo</div>
        </footer>
      </section>

      <section class="view" id="detailView">
        <header>
          <div class="detailHead">
            <button class="backButton" id="backBtn" aria-label="Volver">&lt;</button>
            <h1 id="detailTitle">Drops</h1>
          </div>
          <span class="badge" id="detailBadge">0</span>
        </header>

        <section class="panel items" id="items"></section>

        <footer>
          <div class="status" id="detailStatus">listo</div>
        </footer>
      </section>
    </main>

    <script>
      const SESSION_KEY = "drop_board_r1_session";
      const CONFIG_BOOTSTRAP_ENDPOINT = "https://n8n.calvonavarro.com/webhook/rabbit-r1-config-pin";
      const BOARD_ENDPOINT = "https://n8n.calvonavarro.com/webhook/rabbit-r1-drops-board-v0";

      const FALLBACK_TYPES = [
        "Ideas",
        "Trabajo",
        "Personal",
        "Aprendizaje",
        "Casa",
        "Salud",
        "Finanzas",
        "Relaciones",
        "Foto"
      ];

      const NOTION_COLORS = {
        default: "#8a8178",
        gray: "#78716c",
        brown: "#9a674d",
        orange: "#d97706",
        yellow: "#ca8a04",
        green: "#16a34a",
        blue: "#2563eb",
        purple: "#7c3aed",
        pink: "#db2777",
        red: "#dc2626"
      };

      const state = {
        config: null,
        sessionId: "",
        pin: "",
        mode: "setup",
        selectedType: "Ideas",
        types: FALLBACK_TYPES.map((name) => ({ name, count: 0, notionColor: "default", color: NOTION_COLORS.default })),
        items: [],
        recorder: null,
        audioChunks: [],
        audioMimeType: "",
        listening: false
      };

      const setupView = document.getElementById("setupView");
      const typesView = document.getElementById("typesView");
      const detailView = document.getElementById("detailView");
      const pinDisplay = document.getElementById("pinDisplay");
      const keypad = document.getElementById("keypad");
      const setupStatus = document.getElementById("setupStatus");
      const typesStatus = document.getElementById("typesStatus");
      const detailStatus = document.getElementById("detailStatus");
      const typeBadge = document.getElementById("typeBadge");
      const detailBadge = document.getElementById("detailBadge");
      const detailTitle = document.getElementById("detailTitle");
      const typesEl = document.getElementById("types");
      const itemsEl = document.getElementById("items");
      const backBtn = document.getElementById("backBtn");

      function encode(value) {
        return btoa(unescape(encodeURIComponent(JSON.stringify(value))));
      }

      function decode(value) {
        return JSON.parse(decodeURIComponent(escape(atob(value))));
      }

      async function setStored(key, value) {
        const encoded = encode(value);
        try {
          if (window.creationStorage) {
            await window.creationStorage.plain.setItem(key, encoded);
            return;
          }
        } catch (error) {
          console.warn("storage set failed", error);
        }
        localStorage.setItem(key, encoded);
      }

      async function getStored(key, fallback = null) {
        try {
          if (window.creationStorage) {
            const saved = await window.creationStorage.plain.getItem(key);
            return saved ? decode(saved) : fallback;
          }
        } catch (error) {
          console.warn("storage get failed", error);
        }
        const saved = localStorage.getItem(key);
        return saved ? decode(saved) : fallback;
      }

      function ensureSessionId() {
        if (!state.sessionId) {
          state.sessionId = `r1-board-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
          setStored(SESSION_KEY, state.sessionId);
        }
      }

      function setStatus(text) {
        const clean = String(text || "").trim();
        if (state.mode === "setup") setupStatus.textContent = clean;
        if (state.mode === "types") typesStatus.textContent = clean;
        if (state.mode === "detail") detailStatus.textContent = clean;
      }

      function showSetup() {
        setupView.classList.add("active");
        typesView.classList.remove("active");
        detailView.classList.remove("active");
        state.mode = "setup";
        state.pin = "";
        updatePinDisplay();
      }

      function showTypes() {
        setupView.classList.remove("active");
        typesView.classList.add("active");
        detailView.classList.remove("active");
        state.mode = "types";
        renderTypes();
      }

      function showDetail() {
        setupView.classList.remove("active");
        typesView.classList.remove("active");
        detailView.classList.add("active");
        state.mode = "detail";
        renderItems();
      }

      function normalizeType(entry) {
        if (typeof entry === "string") {
          return { name: entry, count: 0, notionColor: "default", color: NOTION_COLORS.default };
        }

        const notionColor = String(entry.notionColor || entry.colorName || "default");
        const color = String(entry.color || NOTION_COLORS[notionColor] || NOTION_COLORS.default);
        return {
          name: String(entry.name || entry.area || "").trim(),
          count: Number(entry.count || 0),
          notionColor,
          color
        };
      }

      function getTypeMeta(name = state.selectedType) {
        return state.types.find((type) => type.name === name) || normalizeType(name);
      }

      function isLightColor(hex) {
        const clean = String(hex || "").replace("#", "");
        if (clean.length !== 6) return false;
        const r = parseInt(clean.slice(0, 2), 16);
        const g = parseInt(clean.slice(2, 4), 16);
        const b = parseInt(clean.slice(4, 6), 16);
        return (r * 299 + g * 587 + b * 114) / 1000 > 145;
      }

      function updatePinDisplay() {
        const dots = "****".slice(0, state.pin.length);
        pinDisplay.textContent = `${dots}${"----".slice(state.pin.length)}`;
      }

      function pressPinKey(key) {
        if (key === "clear") {
          state.pin = "";
        } else if (key === "back") {
          state.pin = state.pin.slice(0, -1);
        } else if (/^\d$/.test(key) && state.pin.length < 4) {
          state.pin += key;
        }

        updatePinDisplay();
        setupStatus.textContent = state.pin.length ? "marcando..." : "sin configurar";

        if (state.pin.length === 4) {
          fetchConfigByPin();
        }
      }

      async function fetchConfigByPin() {
        setupStatus.textContent = "conectando...";

        try {
          const response = await fetch(CONFIG_BOOTSTRAP_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: new URLSearchParams({ payload: JSON.stringify({ pin: state.pin }) })
          });

          const raw = await response.text();
          const data = raw ? JSON.parse(raw) : {};
          if (!response.ok || data.revoked || data.status === "revoked" || data.error) {
            throw new Error(data.reply || data.error || `HTTP ${response.status}`);
          }

          state.config = data.config || data;
          ensureSessionId();
          showTypes();
          await refreshBoard();
        } catch (error) {
          state.pin = "";
          updatePinDisplay();
          setupStatus.textContent = error.message || "PIN invalido";
        }
      }

      function renderTypes() {
        const visibleTypes = state.types.filter((type) => type.name && type.count > 0);
        const total = visibleTypes.reduce((sum, type) => sum + type.count, 0);
        typeBadge.textContent = `${total} drops`;
        typesEl.innerHTML = "";

        if (!visibleTypes.length) {
          const empty = document.createElement("p");
          empty.className = "item empty";
          empty.textContent = "Sin drops.";
          typesEl.appendChild(empty);
          return;
        }

        for (const type of visibleTypes) {
          const button = document.createElement("button");
          button.className = `typeButton${isLightColor(type.color) ? " light" : ""}`;
          button.style.setProperty("--type-color", type.color);
          button.innerHTML = '<span class="typeName"></span><span class="typeCount"></span>';
          button.querySelector(".typeName").textContent = type.name;
          button.querySelector(".typeCount").textContent = `${type.count} drops`;
          button.addEventListener("click", () => openType(type.name));
          typesEl.appendChild(button);
        }
      }

      function renderItems() {
        const meta = getTypeMeta();
        detailTitle.textContent = meta.name || "Drops";
        detailBadge.textContent = `${state.items.length}`;
        itemsEl.style.setProperty("--type-color", meta.color);
        itemsEl.innerHTML = "";

        const items = state.items.length
          ? state.items
          : [{ title: "Sin drops", observations: "Long press para crear uno nuevo." }];

        for (const item of items) {
          const el = document.createElement("p");
          el.className = `item${state.items.length ? "" : " empty"}`;
          el.style.setProperty("--type-color", meta.color);
          const title = document.createElement("span");
          title.className = "itemTitle";
          title.textContent = item.title || "Drop";
          el.appendChild(title);

          if (item.observations) {
            const body = document.createElement("span");
            body.className = "itemBody";
            body.textContent = item.observations;
            el.appendChild(body);
          }
          itemsEl.appendChild(el);
        }
        itemsEl.scrollTop = 0;
      }

      function applyBoardData(data) {
        if (Array.isArray(data.types)) {
          state.types = data.types.map(normalizeType).filter((type) => type.name && type.count > 0);
        }

        if (data.area) state.selectedType = data.area;
        state.items = Array.isArray(data.items) ? data.items : [];
      }

      async function postBoard(payload) {
        if (!state.config) {
          showSetup();
          return null;
        }

        ensureSessionId();
        const response = await fetch(BOARD_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
          body: new URLSearchParams({
            payload: JSON.stringify({
              token: state.config.token,
              area: state.selectedType,
              sessionId: state.sessionId,
              source: "rabbit-r1-drop-board",
              sentAt: new Date().toISOString(),
              ...payload
            })
          })
        });

        const raw = await response.text();
        let data = raw;
        try {
          data = raw ? JSON.parse(raw) : {};
        } catch (error) {
          data = { reply: raw || `HTTP ${response.status}` };
        }

        if (!response.ok || data.revoked || data.status === "revoked") {
          throw new Error(data.reply || `HTTP ${response.status}`);
        }

        return data;
      }

      async function refreshBoard() {
        setStatus("cargando...");

        try {
          const data = await postBoard({ action: "list" });
          if (!data) return;
          applyBoardData(data);
          if (!state.types.some((type) => type.name === state.selectedType) && state.types[0]) {
            state.selectedType = state.types[0].name;
          }
          renderTypes();
          if (state.mode === "detail") renderItems();
          setStatus(data.reply || "actualizado");
        } catch (error) {
          setStatus(error.message || "fallo de red");
        }
      }

      async function openType(typeName) {
        state.selectedType = typeName;
        state.items = [];
        showDetail();
        detailStatus.textContent = "cargando...";

        try {
          const data = await postBoard({ action: "list", area: typeName });
          if (!data) return;
          applyBoardData(data);
          showDetail();
          detailStatus.textContent = data.reply || "lista actualizada";
        } catch (error) {
          detailStatus.textContent = error.message || "fallo de red";
        }
      }

      function goBack() {
        if (state.mode !== "detail") return;
        showTypes();
        typesStatus.textContent = "listo";
      }

      function getSupportedAudioMimeType() {
        if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return "";
        const types = ["audio/webm;codecs=opus", "audio/webm", "audio/ogg;codecs=opus", "audio/mp4"];
        return types.find((type) => MediaRecorder.isTypeSupported(type)) || "";
      }

      function blobToDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(reader.error || new Error("audio invalido"));
          reader.readAsDataURL(blob);
        });
      }

      async function startVoice() {
        if (!state.config || state.listening) return;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder) {
          setStatus("micro no disponible");
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          const mimeType = getSupportedAudioMimeType();
          state.audioChunks = [];
          state.audioMimeType = mimeType || "audio/webm";
          state.recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);

          state.recorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) state.audioChunks.push(event.data);
          };

          state.recorder.onstop = async () => {
            state.listening = false;
            stream.getTracks().forEach((track) => track.stop());
            const blob = new Blob(state.audioChunks, { type: state.audioMimeType });
            state.audioChunks = [];
            if (!blob.size) {
              setStatus("audio vacio");
              return;
            }
            await sendInstruction(blob);
          };

          state.recorder.start();
          state.listening = true;
          setStatus("escuchando...");
        } catch (error) {
          setStatus("micro denegado");
        }
      }

      function stopVoice() {
        if (!state.recorder || !state.listening) return;
        setStatus("procesando...");
        state.recorder.stop();
      }

      async function sendInstruction(blob) {
        try {
          const dataUrl = await blobToDataUrl(blob);
          const audioBase64 = dataUrl.includes(",") ? dataUrl.split(",").pop() : dataUrl;
          const data = await postBoard({
            action: "instruct",
            audioBase64,
            audioMimeType: blob.type || state.audioMimeType || "audio/webm",
            audioName: "drop-board-r1.webm"
          });
          if (!data) return;
          applyBoardData(data);
          showDetail();
          detailStatus.textContent = data.reply || "actualizado";
        } catch (error) {
          setStatus(error.message || "fallo de red");
        }
      }

      function handleSideClick() {
        if (state.mode === "detail") {
          goBack();
          return;
        }
        if (state.mode === "types") {
          typesStatus.textContent = "long press: PTT";
        }
      }

      keypad.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-key]");
        if (!button) return;
        pressPinKey(button.dataset.key || "");
      });

      backBtn.addEventListener("click", goBack);
      window.addEventListener("sideClick", handleSideClick);
      window.addEventListener("longPressStart", startVoice);
      window.addEventListener("longPressEnd", stopVoice);

      async function boot() {
        state.sessionId = await getStored(SESSION_KEY, "");
        showSetup();
      }

      boot();
    </script>
  </body>
</html>
