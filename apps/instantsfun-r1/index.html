<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=240, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Instantsfun R1</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 240px;
        height: 282px;
        margin: 0;
        overflow: hidden;
        background: #0e1117;
        color: #f7f7f2;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        border: 4px solid #ffcc29;
      }

      main {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 6px;
        padding: 8px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1;
      }

      .counter {
        min-width: 42px;
        height: 25px;
        display: grid;
        place-items: center;
        border: 1px solid #4f5664;
        border-radius: 6px;
        color: #ffcc29;
        font-size: 11px;
        font-weight: 800;
      }

      .now {
        min-height: 39px;
        display: grid;
        grid-template-columns: 31px 1fr;
        gap: 7px;
        align-items: center;
        border: 2px solid #050505;
        padding: 6px;
        background: #171c26;
        box-shadow: inset -2px -2px 0 #06080d, inset 2px 2px 0 #313847;
      }

      .orb {
        width: 27px;
        height: 27px;
        background: var(--accent, #ff3b30);
        clip-path: polygon(0 6px, 6px 6px, 6px 0, calc(100% - 6px) 0, calc(100% - 6px) 6px, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 6px calc(100% - 6px), 0 calc(100% - 6px));
        box-shadow: inset -5px -5px 0 rgba(0, 0, 0, 0.24);
      }

      .label {
        min-width: 0;
      }

      .label strong {
        display: block;
        font-size: 15px;
        line-height: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .label span {
        display: block;
        margin-top: 4px;
        color: #9da6b8;
        font-size: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .list {
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-content: start;
        gap: 6px;
        overflow-y: auto;
        border: 2px solid #050505;
        padding: 6px;
        background: #111722;
        scrollbar-width: none;
      }

      .list::-webkit-scrollbar {
        display: none;
      }

      button.item {
        width: 100%;
        height: 42px;
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 2px;
        align-items: center;
        justify-items: center;
        border: 2px solid #050505;
        padding: 5px 4px 4px;
        background: var(--accent, #ffcc29);
        color: #f7f7f2;
        text-align: center;
        font: inherit;
        clip-path: polygon(0 6px, 6px 6px, 6px 0, calc(100% - 6px) 0, calc(100% - 6px) 6px, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 6px calc(100% - 6px), 0 calc(100% - 6px));
        box-shadow: inset -4px -4px 0 rgba(0, 0, 0, 0.24), inset 3px 3px 0 rgba(255, 255, 255, 0.18);
      }

      button.item.active {
        outline: 2px solid #ffffff;
        outline-offset: -5px;
      }

      .dot {
        width: 15px;
        height: 7px;
        background: rgba(0, 0, 0, 0.28);
        clip-path: polygon(0 3px, 3px 3px, 3px 0, calc(100% - 3px) 0, calc(100% - 3px) 3px, 100% 3px, 100% 100%, 0 100%);
      }

      .name {
        width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #080808;
        font-size: 10px;
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
      }

      footer {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 7px;
      }

      .action {
        height: 34px;
        border: 2px solid #050505;
        color: #101010;
        font-size: 12px;
        font-weight: 850;
        clip-path: polygon(0 6px, 6px 6px, 6px 0, calc(100% - 6px) 0, calc(100% - 6px) 6px, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 6px calc(100% - 6px), 0 calc(100% - 6px));
        box-shadow: inset -4px -4px 0 rgba(0, 0, 0, 0.22), inset 3px 3px 0 rgba(255, 255, 255, 0.2);
      }

      .play {
        background: #ffcc29;
      }

      .stop {
        background: #ff5c5c;
      }

      .random {
        background: #6dd6ff;
      }

      .status {
        grid-column: 1 / -1;
        height: 12px;
        color: #9da6b8;
        font-size: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Instantsfun</h1>
        <div class="counter" id="counter">1/1</div>
      </header>

      <section class="now">
        <div class="orb" id="heroOrb"></div>
        <div class="label">
          <strong id="title">...</strong>
          <span id="subtitle">scroll navega, lateral random</span>
        </div>
      </section>

      <section class="list" id="list"></section>

      <footer>
        <button class="action play" id="playBtn">Play</button>
        <button class="action random" id="randomBtn">Rand</button>
        <button class="action stop" id="stopBtn">Stop</button>
        <div class="status" id="status">shake detiene todo</div>
      </footer>
    </main>

    <script src="./sounds.js"></script>
    <script>
      const sounds = window.INSTANTSFUN_SOUNDS || [];

      const state = {
        index: 0,
        lastShake: 0,
        audio: new Audio()
      };

      const listEl = document.getElementById("list");
      const titleEl = document.getElementById("title");
      const subtitleEl = document.getElementById("subtitle");
      const counterEl = document.getElementById("counter");
      const statusEl = document.getElementById("status");
      const heroOrbEl = document.getElementById("heroOrb");

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function buttonFor(index) {
        return listEl.querySelector(`[data-index="${index}"]`);
      }

      function renderList() {
        const fragment = document.createDocumentFragment();

        sounds.forEach((sound, index) => {
          const button = document.createElement("button");
          button.className = "item";
          button.type = "button";
          button.dataset.index = String(index);
          button.style.setProperty("--accent", sound.color);
          button.innerHTML = `<span class="dot"></span><span class="name"></span>`;
          button.querySelector(".name").textContent = sound.name;
          button.addEventListener("click", () => {
            state.index = index;
            updateSelection(false);
            playSelected();
          });
          fragment.appendChild(button);
        });

        listEl.innerHTML = "";
        listEl.appendChild(fragment);
      }

      function updateSelection(shouldScroll = true) {
        if (!sounds.length) {
          titleEl.textContent = "Sin botones";
          subtitleEl.textContent = "no hay sonidos cargados";
          counterEl.textContent = "0/0";
          return;
        }

        const current = sounds[state.index];
        titleEl.textContent = current.name;
        subtitleEl.textContent = `${sounds.length} botones cargados`;
        counterEl.textContent = `${state.index + 1}/${sounds.length}`;
        heroOrbEl.style.setProperty("--accent", current.color);

        listEl.querySelectorAll(".item.active").forEach((button) => {
          button.classList.remove("active");
        });

        const activeButton = buttonFor(state.index);
        if (activeButton) {
          activeButton.classList.add("active");
          if (shouldScroll) activeButton.scrollIntoView({ block: "nearest", inline: "nearest" });
        }
      }

      function stopAll(reason = "parado") {
        state.audio.pause();
        state.audio.currentTime = 0;
        setStatus(reason);
      }

      function playSelected() {
        if (!sounds.length) return;

        const sound = sounds[state.index];
        stopAll("cargando...");
        state.audio = new Audio(sound.src);
        state.audio.preload = "auto";
        state.audio.addEventListener("ended", () => setStatus("listo"));
        state.audio.addEventListener("error", () => setStatus("error audio"));

        state.audio.play()
          .then(() => setStatus(`play: ${sound.name}`))
          .catch((error) => setStatus(error && error.name ? error.name : "audio bloqueado"));
      }

      function move(offset) {
        if (!sounds.length) return;

        state.index = (state.index + offset + sounds.length) % sounds.length;
        updateSelection();
        setStatus("seleccionado");
      }

      function playRandom() {
        if (!sounds.length) return;

        let next = Math.floor(Math.random() * sounds.length);
        if (sounds.length > 1 && next === state.index) next = (next + 1) % sounds.length;
        state.index = next;
        updateSelection();
        playSelected();
      }

      function startAccelerometer() {
        if (!window.creationSensors || !window.creationSensors.accelerometer) return;

        window.creationSensors.accelerometer.start((data) => {
          const x = data.rawX ?? data.x ?? 0;
          const y = data.rawY ?? data.y ?? 0;
          const z = data.rawZ ?? data.z ?? 0;
          const force = Math.abs(x) + Math.abs(y) + Math.abs(z);
          const now = Date.now();

          if (force > 22 && now - state.lastShake > 900) {
            state.lastShake = now;
            stopAll("shake stop");
          }
        }, { frequency: 30 });
      }

      document.getElementById("playBtn").addEventListener("click", playSelected);
      document.getElementById("randomBtn").addEventListener("click", playRandom);
      document.getElementById("stopBtn").addEventListener("click", () => stopAll("stop"));

      window.addEventListener("scrollUp", () => move(1));
      window.addEventListener("scrollDown", () => move(-1));
      window.addEventListener("sideClick", playRandom);
      window.addEventListener("longPressStart", () => stopAll("stop"));

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowDown") move(1);
        if (event.key === "ArrowUp") move(-1);
        if (event.key === " ") {
          event.preventDefault();
          playSelected();
        }
        if (event.key === "Escape") stopAll("stop");
        if (event.key.toLowerCase() === "r") playRandom();
      });

      renderList();
      updateSelection(false);
      startAccelerometer();
    </script>
  </body>
</html>
