<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=240, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Instantsfun R1</title>
    <style>
      * {
        box-sizing: border-box;
      }

      @font-face {
        font-family: "InstantsfunLogo";
        src: url("./slapstick_shaded.ttf") format("truetype");
        font-display: swap;
      }

      html,
      body {
        width: 240px;
        height: 282px;
        margin: 0;
        overflow: hidden;
        background: #0e1117;
        color: #f7f7f2;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        border: 4px solid #ffcc29;
        position: relative;
      }

      main {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: 26px 1fr;
        gap: 5px;
        padding: 6px;
      }

      header {
        display: grid;
        grid-template-columns: 1fr 48px;
        align-items: center;
        gap: 5px;
        min-height: 0;
      }

      h1 {
        margin: 0;
        min-width: 0;
        overflow: hidden;
        color: #ffffff;
        font-family: "InstantsfunLogo", ui-sans-serif, system-ui, sans-serif;
        font-size: 21px;
        font-weight: 400;
        line-height: 1;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .list {
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-content: start;
        gap: 6px;
        overflow-y: auto;
        border: 2px solid #050505;
        padding: 6px;
        background: #111722;
        scrollbar-width: none;
      }

      .list::-webkit-scrollbar {
        display: none;
      }

      button.item {
        width: 100%;
        height: 42px;
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 2px;
        align-items: center;
        justify-items: center;
        border: 2px solid #050505;
        padding: 5px 4px 4px;
        background: var(--accent, #ffcc29);
        color: #f7f7f2;
        text-align: center;
        font: inherit;
        clip-path: polygon(0 6px, 6px 6px, 6px 0, calc(100% - 6px) 0, calc(100% - 6px) 6px, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 6px calc(100% - 6px), 0 calc(100% - 6px));
        box-shadow: inset -4px -4px 0 rgba(0, 0, 0, 0.24), inset 3px 3px 0 rgba(255, 255, 255, 0.18);
      }

      button.item.active {
        outline: 2px solid #ffffff;
        outline-offset: -5px;
      }

      .dot {
        width: 15px;
        height: 7px;
        background: rgba(0, 0, 0, 0.28);
        clip-path: polygon(0 3px, 3px 3px, 3px 0, calc(100% - 3px) 0, calc(100% - 3px) 3px, 100% 3px, 100% 100%, 0 100%);
      }

      .name {
        width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #080808;
        font-size: 10px;
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
      }

      button.item.dark .name {
        color: #ffffff;
      }

      button.item.dark .dot {
        background: rgba(255, 255, 255, 0.32);
      }

      footer {
        display: none;
      }

      .action {
        height: 24px;
        border: 2px solid #050505;
        color: #101010;
        font-size: 10px;
        font-weight: 850;
        clip-path: polygon(0 6px, 6px 6px, 6px 0, calc(100% - 6px) 0, calc(100% - 6px) 6px, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 6px calc(100% - 6px), 0 calc(100% - 6px));
        box-shadow: inset -4px -4px 0 rgba(0, 0, 0, 0.22), inset 3px 3px 0 rgba(255, 255, 255, 0.2);
      }

      .play {
        background: #ffcc29;
      }

      .stop {
        background: #ff5c5c;
      }

      .random {
        background: #6dd6ff;
      }

      .status {
        position: fixed;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
      }

      .side-hint {
        position: absolute;
        top: 31px;
        right: -4px;
        z-index: 2;
        display: grid;
        grid-template-columns: auto auto;
        align-items: center;
        gap: 0;
        height: 11px;
        padding: 1px 1px 1px 3px;
        border: 2px solid #050505;
        border-right: 0;
        background: #6dd6ff;
        color: #050505;
        font-size: 7px;
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
        clip-path: polygon(0 4px, 4px 4px, 4px 0, 100% 0, 100% 100%, 4px 100%, 4px calc(100% - 4px), 0 calc(100% - 4px));
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Instantsfun!</h1>
        <button class="action stop" id="stopBtn">Stop</button>
      </header>

      <div class="side-hint" aria-hidden="true"><span>rand</span><span>→</span></div>

      <section class="list" id="list"></section>

      <footer>
        <div class="status" id="status">shake detiene todo</div>
      </footer>
    </main>

    <script src="./sounds.js"></script>
    <script>
      const sounds = window.INSTANTSFUN_SOUNDS || [];

      const state = {
        index: 0,
        lastShake: 0,
        audio: new Audio()
      };

      const listEl = document.getElementById("list");
      const statusEl = document.getElementById("status");

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function buttonFor(index) {
        return listEl.querySelector(`[data-index="${index}"]`);
      }

      function renderList() {
        const fragment = document.createDocumentFragment();

        sounds.forEach((sound, index) => {
          const button = document.createElement("button");
          button.className = sound.color === "#141414" ? "item dark" : "item";
          button.type = "button";
          button.dataset.index = String(index);
          button.style.setProperty("--accent", sound.color);
          button.innerHTML = `<span class="dot"></span><span class="name"></span>`;
          button.querySelector(".name").textContent = sound.name;
          button.addEventListener("click", () => {
            state.index = index;
            updateSelection(false);
            playSelected();
          });
          fragment.appendChild(button);
        });

        listEl.innerHTML = "";
        listEl.appendChild(fragment);
      }

      function updateSelection(shouldScroll = true) {
        if (!sounds.length) return;

        listEl.querySelectorAll(".item.active").forEach((button) => {
          button.classList.remove("active");
        });

        const activeButton = buttonFor(state.index);
        if (activeButton) {
          activeButton.classList.add("active");
          if (shouldScroll) activeButton.scrollIntoView({ block: "nearest", inline: "nearest" });
        }
      }

      function stopAll(reason = "parado") {
        state.audio.pause();
        state.audio.currentTime = 0;
        setStatus(reason);
      }

      function playSelected() {
        if (!sounds.length) return;

        const sound = sounds[state.index];
        stopAll("cargando...");
        state.audio = new Audio(sound.src);
        state.audio.preload = "auto";
        state.audio.addEventListener("ended", () => setStatus("listo"));
        state.audio.addEventListener("error", () => setStatus("error audio"));

        state.audio.play()
          .then(() => setStatus(`play: ${sound.name}`))
          .catch((error) => setStatus(error && error.name ? error.name : "audio bloqueado"));
      }

      function move(offset) {
        if (!sounds.length) return;

        state.index = (state.index + offset + sounds.length) % sounds.length;
        updateSelection();
        setStatus("seleccionado");
      }

      function playRandom() {
        if (!sounds.length) return;

        let next = Math.floor(Math.random() * sounds.length);
        if (sounds.length > 1 && next === state.index) next = (next + 1) % sounds.length;
        state.index = next;
        updateSelection();
        playSelected();
      }

      function startAccelerometer() {
        if (!window.creationSensors || !window.creationSensors.accelerometer) return;

        window.creationSensors.accelerometer.start((data) => {
          const x = data.rawX ?? data.x ?? 0;
          const y = data.rawY ?? data.y ?? 0;
          const z = data.rawZ ?? data.z ?? 0;
          const force = Math.abs(x) + Math.abs(y) + Math.abs(z);
          const now = Date.now();

          if (force > 22 && now - state.lastShake > 900) {
            state.lastShake = now;
            stopAll("shake stop");
          }
        }, { frequency: 30 });
      }

      document.getElementById("stopBtn").addEventListener("click", () => stopAll("stop"));

      window.addEventListener("scrollUp", () => move(1));
      window.addEventListener("scrollDown", () => move(-1));
      window.addEventListener("sideClick", playRandom);
      window.addEventListener("longPressStart", () => stopAll("stop"));

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowDown") move(1);
        if (event.key === "ArrowUp") move(-1);
        if (event.key === " ") {
          event.preventDefault();
          playSelected();
        }
        if (event.key === "Escape") stopAll("stop");
        if (event.key.toLowerCase() === "r") playRandom();
      });

      renderList();
      updateSelection(false);
      startAccelerometer();
    </script>
  </body>
</html>
