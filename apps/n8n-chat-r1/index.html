<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=240, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>n8n Chat R1</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 240px;
        height: 282px;
        margin: 0;
        overflow: hidden;
        background: #0f1411;
        color: #f4f2e9;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        border: 4px solid #2de38c;
      }

      button {
        font: inherit;
      }

      main {
        width: 100%;
        height: 100%;
        padding: 6px 8px 7px;
      }

      .view {
        display: none;
        width: 100%;
        height: 100%;
      }

      .view.active {
        display: grid;
      }

      #setupView {
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 5px;
      }

      #chatView {
        grid-template-rows: auto 1fr auto;
        gap: 6px;
        position: relative;
      }

      #cameraView {
        grid-template-rows: auto 1fr auto;
        gap: 6px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 17px;
        line-height: 1;
        letter-spacing: 0;
      }

      .badge {
        min-width: 0;
        max-width: 92px;
        height: 22px;
        padding: 0 6px;
        border: 1px solid #2c5d44;
        border-radius: 5px;
        display: grid;
        place-items: center;
        color: #a8d9bf;
        font-size: 10px;
        font-weight: 800;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .copy {
        margin: 0;
        color: #a8d9bf;
        font-size: 12px;
        line-height: 1.2;
      }

      .panel {
        min-height: 0;
        border: 1px solid #2c5d44;
        border-radius: 7px;
        background: #17221c;
        overflow: hidden;
      }

      .pinPanel {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 6px;
        padding: 7px;
      }

      .pinLabel {
        color: #a8d9bf;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .pinDisplay {
        height: 32px;
        border: 1px solid #2c5d44;
        border-radius: 6px;
        background: #101812;
        color: #f4f2e9;
        display: grid;
        place-items: center;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: 4px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .actions.three {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .keypad {
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, minmax(0, 1fr));
        gap: 5px;
      }

      button {
        height: 34px;
        border: 0;
        border-radius: 6px;
        background: #2de38c;
        color: #07110c;
        font-size: 12px;
        font-weight: 900;
      }

      button.secondary {
        background: #f7c948;
      }

      button.danger {
        background: #ff6b6b;
      }

      button:disabled {
        opacity: 0.5;
      }

      .key {
        height: auto;
        min-height: 0;
        border: 1px solid #2c5d44;
        border-radius: 6px;
        background: #223229;
        color: #f4f2e9;
        font-size: 16px;
      }

      .key.primary {
        background: #2de38c;
        color: #07110c;
      }

      .messages {
        min-height: 0;
        padding: 6px;
        overflow-y: auto;
      }

      #chatView.capturing .messages {
        border-color: #2de38c;
        background: #0f1f17;
        box-shadow: inset 0 0 0 2px rgba(45, 227, 140, 0.55), 0 0 0 2px rgba(45, 227, 140, 0.35);
      }

      .captureOverlay {
        position: absolute;
        inset: 30px 8px 22px;
        display: none;
        place-items: center;
        border: 2px solid #2de38c;
        border-radius: 7px;
        background: rgba(7, 17, 12, 0.88);
        color: #f4f2e9;
        text-align: center;
        pointer-events: none;
        z-index: 3;
        animation: capturePulse 0.72s ease-in-out infinite alternate;
      }

      #chatView.capturing .captureOverlay {
        display: grid;
      }

      .captureOverlay span,
      .captureOverlay strong {
        display: block;
      }

      .captureOverlay span {
        margin-bottom: 5px;
        color: #2de38c;
        font-size: 42px;
        line-height: 0.9;
        font-weight: 950;
      }

      .captureOverlay strong {
        font-size: 13px;
        text-transform: uppercase;
      }

      @keyframes capturePulse {
        from {
          transform: scale(0.98);
          opacity: 0.82;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .cameraPanel {
        position: relative;
        display: grid;
        place-items: center;
        background: #050806;
      }

      .cameraPanel video,
      .cameraPanel img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .cameraPanel img {
        display: none;
      }

      .cameraPanel.captured video {
        display: none;
      }

      .cameraPanel.captured img {
        display: block;
      }

      .cameraPanel.saving {
        pointer-events: none;
      }

      .cameraHint {
        position: absolute;
        left: 6px;
        right: 6px;
        bottom: 6px;
        padding: 5px 6px;
        border: 1px solid rgba(45, 227, 140, 0.45);
        border-radius: 6px;
        background: rgba(15, 20, 17, 0.72);
        color: #f4f2e9;
        font-size: 10px;
        font-weight: 800;
        text-align: center;
      }

      .msg {
        margin: 0 0 5px;
        padding: 6px;
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.18;
        word-break: break-word;
      }

      .msg.user {
        background: #f7c948;
        color: #101812;
      }

      .msg.bot {
        background: #213229;
        color: #f4f2e9;
      }

      .msg.system {
        border: 1px solid #2c5d44;
        color: #a8d9bf;
      }

      .msg.voice {
        background: #2de38c;
        color: #07110c;
      }

      .status {
        min-height: 13px;
        color: #a8d9bf;
        font-size: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .tiny {
        height: 24px;
        padding: 0 6px;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="view active" id="setupView">
        <header>
          <h1>n8n Chat</h1>
          <span class="badge">setup</span>
        </header>

        <section class="panel pinPanel">
          <div>
            <div class="pinLabel">PIN</div>
            <div class="pinDisplay" id="pinDisplay">----</div>
          </div>

          <div class="keypad" id="keypad">
            <button class="key" data-key="1">1</button>
            <button class="key" data-key="2">2</button>
            <button class="key" data-key="3">3</button>
            <button class="key" data-key="4">4</button>
            <button class="key" data-key="5">5</button>
            <button class="key" data-key="6">6</button>
            <button class="key" data-key="7">7</button>
            <button class="key" data-key="8">8</button>
            <button class="key" data-key="9">9</button>
            <button class="key" data-key="clear">C</button>
            <button class="key" data-key="0">0</button>
            <button class="key primary" data-key="back">&lt;</button>
          </div>
        </section>

        <footer>
          <div class="status" id="setupStatus">sin configurar</div>
        </footer>
      </section>

      <section class="view" id="chatView">
        <header>
          <h1>n8n Chat</h1>
          <span class="badge" id="profileName">conectado</span>
        </header>

        <section class="panel messages" id="messages"></section>
        <div class="captureOverlay" id="captureOverlay">
          <div>
            <span>REC</span>
            <strong>capturando</strong>
          </div>
        </div>

        <footer>
          <div class="status" id="chatStatus">listo</div>
        </footer>
      </section>

      <section class="view" id="cameraView">
        <header>
          <h1>Camara</h1>
          <span class="badge" id="cameraBadge">preview</span>
        </header>

        <section class="panel cameraPanel" id="cameraPanel">
          <video id="cameraVideo" muted playsinline></video>
          <img id="photoPreview" alt="Foto capturada" />
          <div class="cameraHint" id="cameraHint">tap foto</div>
        </section>

        <footer>
          <div class="status" id="cameraStatus">iniciando...</div>
        </footer>
      </section>
    </main>

    <script>
      const CONFIG_KEY = "n8n_chat_r1_config";
      const SESSION_KEY = "n8n_chat_r1_session";
      const HISTORY_KEY = "n8n_chat_r1_history";
      const CONFIG_BOOTSTRAP_ENDPOINT = "https://n8n.calvonavarro.com/webhook/rabbit-r1-config-pin";

      const state = {
        config: null,
        history: [],
        sessionId: "",
        pin: "",
        stream: null,
        listening: false,
        recorder: null,
        audioChunks: [],
        audioMimeType: "",
        cameraStream: null,
        photoDataUrl: "",
        mode: "setup",
        lastSideClickAt: 0,
        cameraLongTapTimer: null,
        cameraSavingTimer: null,
        ignoreNextCameraTap: false,
        cameraSaving: false,
        lastShakeAt: 0,
        finalTranscript: "",
        interimTranscript: "",
        lastReply: ""
      };

      const setupView = document.getElementById("setupView");
      const chatView = document.getElementById("chatView");
      const cameraView = document.getElementById("cameraView");
      const pinDisplay = document.getElementById("pinDisplay");
      const keypad = document.getElementById("keypad");
      const setupStatus = document.getElementById("setupStatus");
      const chatStatus = document.getElementById("chatStatus");
      const cameraStatus = document.getElementById("cameraStatus");
      const cameraBadge = document.getElementById("cameraBadge");
      const cameraPanel = document.getElementById("cameraPanel");
      const cameraVideo = document.getElementById("cameraVideo");
      const photoPreview = document.getElementById("photoPreview");
      const cameraHint = document.getElementById("cameraHint");
      const messagesEl = document.getElementById("messages");
      const profileName = document.getElementById("profileName");

      function encode(value) {
        return btoa(unescape(encodeURIComponent(JSON.stringify(value))));
      }

      function decode(value) {
        return JSON.parse(decodeURIComponent(escape(atob(value))));
      }

      async function setStored(key, value, secure = false) {
        const encoded = encode(value);

        try {
          if (window.creationStorage) {
            const area = secure && window.creationStorage.secure ? window.creationStorage.secure : window.creationStorage.plain;
            await area.setItem(key, encoded);
            return;
          }
        } catch (error) {
          console.warn("creationStorage set failed", error);
        }

        localStorage.setItem(key, encoded);
      }

      async function getStored(key, fallback = null, secure = false) {
        try {
          if (window.creationStorage) {
            const area = secure && window.creationStorage.secure ? window.creationStorage.secure : window.creationStorage.plain;
            const saved = await area.getItem(key);
            return saved ? decode(saved) : fallback;
          }
        } catch (error) {
          console.warn("creationStorage get failed", error);
        }

        const saved = localStorage.getItem(key);
        return saved ? decode(saved) : fallback;
      }

      async function removeStored(key, secure = false) {
        try {
          if (window.creationStorage) {
            const area = secure && window.creationStorage.secure ? window.creationStorage.secure : window.creationStorage.plain;
            await area.removeItem(key);
          }
        } catch (error) {
          console.warn("creationStorage remove failed", error);
        }

        localStorage.removeItem(key);
      }

      function setSetupStatus(text) {
        setupStatus.textContent = text;
      }

      function setChatStatus(text) {
        chatStatus.textContent = text;
      }

      function setListeningVisual(isListening) {
        chatView.classList.toggle("capturing", Boolean(isListening));
      }

      function setCameraStatus(text) {
        cameraStatus.textContent = text;
      }

      function setCameraSaving(isSaving) {
        state.cameraSaving = isSaving;
        cameraPanel.classList.toggle("saving", isSaving);

        if (state.cameraSavingTimer) {
          clearInterval(state.cameraSavingTimer);
          state.cameraSavingTimer = null;
        }

        if (isSaving) {
          let dots = 0;
          const tick = () => {
            dots = (dots + 1) % 4;
            const text = `guardando${".".repeat(dots || 3)}`;
            cameraBadge.textContent = "guardando";
            cameraHint.textContent = text;
            setCameraStatus(text);
          };
          tick();
          state.cameraSavingTimer = setInterval(tick, 360);
          return;
        }

        cameraBadge.textContent = isSaving ? "guardando" : state.photoDataUrl ? "foto" : "preview";
        cameraHint.textContent = isSaving ? "espera..." : state.photoDataUrl ? "tap guarda / long tap borra" : "side foto";
      }

      function ensureSessionId() {
        if (!state.sessionId) {
          state.sessionId = `r1-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
          setStored(SESSION_KEY, state.sessionId);
        }
      }

      function showSetup() {
        setupView.classList.add("active");
        chatView.classList.remove("active");
        cameraView.classList.remove("active");
        state.mode = "setup";
        state.pin = "";
        updatePinDisplay();
      }

      function showChat() {
        setupView.classList.remove("active");
        chatView.classList.add("active");
        cameraView.classList.remove("active");
        state.mode = "chat";
        profileName.textContent = state.config.name || "n8n";
        renderMessages();
      }

      function showCamera() {
        setupView.classList.remove("active");
        chatView.classList.remove("active");
        cameraView.classList.add("active");
        state.mode = "camera";
      }

      function parseConfig(raw) {
        const text = String(raw || "").trim();
        if (!text) throw new Error("config vacia");

        let data;
        if (text.startsWith("http")) {
          const url = new URL(text);
          data = {
            endpoint: url.searchParams.get("endpoint") || url.searchParams.get("url") || "",
            token: url.searchParams.get("token") || url.searchParams.get("key") || "",
            name: url.searchParams.get("name") || "n8n",
            speak: url.searchParams.get("speak") !== "false",
            lang: url.searchParams.get("lang") || "es-ES"
          };
        } else {
          data = JSON.parse(text);
        }

        const endpoint = String(data.endpoint || data.url || "").trim();
        const token = String(data.token || data.apiKey || data.key || "").trim();
        const name = String(data.name || "n8n").trim().slice(0, 24);

        if (!endpoint) throw new Error("falta endpoint");
        if (!token) throw new Error("falta token");

        const url = new URL(endpoint);
        const isLocal = url.hostname === "localhost" || url.hostname === "127.0.0.1";
        if (url.protocol !== "https:" && !isLocal) throw new Error("endpoint debe ser https");

        return {
          endpoint: url.toString(),
          token,
          name,
          speak: data.speak !== false,
          lang: String(data.lang || "es-ES").trim() || "es-ES",
          v: Number(data.v || 1)
        };
      }

      async function saveConfigFromText(raw) {
        try {
          const config = parseConfig(raw);
          state.config = config;
          await setStored(CONFIG_KEY, config, true);
          setSetupStatus("config guardada");
          showChat();
        } catch (error) {
          setSetupStatus(error.message || "QR invalido");
        }
      }

      async function fetchConfigByPin() {
        const pin = String(state.pin || "").trim();
        if (!pin) {
          setSetupStatus("falta PIN");
          return;
        }

        setSetupStatus("conectando...");

        try {
          const response = await fetch(CONFIG_BOOTSTRAP_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: new URLSearchParams({ payload: JSON.stringify({ pin }) })
          });

          const raw = await response.text();
          let data = {};

          try {
            data = raw ? JSON.parse(raw) : {};
          } catch (error) {
            throw new Error("respuesta invalida");
          }

          if (!response.ok || data.revoked || data.status === "revoked" || data.error) {
            throw new Error(data.reply || data.error || `HTTP ${response.status}`);
          }

          const config = data.config || data;
          await saveConfigFromText(JSON.stringify(config));
        } catch (error) {
          state.pin = "";
          updatePinDisplay();
          setSetupStatus(error.message || "PIN invalido");
        }
      }

      function updatePinDisplay() {
        const dots = "****".slice(0, state.pin.length);
        pinDisplay.textContent = `${dots}${"----".slice(state.pin.length)}`;
      }

      function pressPinKey(key) {
        if (key === "clear") {
          state.pin = "";
        } else if (key === "back") {
          state.pin = state.pin.slice(0, -1);
        } else if (/^\d$/.test(key) && state.pin.length < 4) {
          state.pin += key;
        }

        updatePinDisplay();
        setSetupStatus(state.pin.length ? "marcando..." : "sin configurar");

        if (state.pin.length === 4) {
          fetchConfigByPin();
        }
      }

      function addMessage(role, text) {
        state.history.push({ role, text: String(text || "").slice(0, 700) });
        state.history = state.history.slice(-8);
        setStored(HISTORY_KEY, state.history);
        renderMessages();
      }

      function renderMessages() {
        messagesEl.innerHTML = "";

        const items = state.history.length
          ? state.history
          : [{ role: "system", text: "Mantén PTT para dictar." }];

        for (const item of items) {
          const el = document.createElement("p");
          el.className = `msg ${item.role}`;
          el.textContent = item.text;
          messagesEl.appendChild(el);
        }

        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function isRevoked(payload) {
        if (!payload) return false;
        const text = typeof payload === "string" ? payload.toLowerCase() : "";
        return Boolean(
          payload.revoked === true ||
          payload.status === "revoked" ||
          payload.error === "revoked" ||
          text.includes("revoked")
        );
      }

      function extractReply(payload) {
        if (typeof payload === "string") return payload;
        return payload.reply || payload.output || payload.text || payload.message || JSON.stringify(payload);
      }

      function speakText(text) {
        const clean = String(text || "").trim();
        if (!clean || !state.config || state.config.speak === false) return;

        if (typeof PluginMessageHandler !== "undefined") {
          PluginMessageHandler.postMessage(JSON.stringify({
            message: `Lee en voz alta, de forma breve y clara: ${clean}`,
            useLLM: true,
            wantsR1Response: true,
            wantsJournalEntry: false
          }));
          return;
        }

        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(new SpeechSynthesisUtterance(clean));
        }
      }

      function playSaveChime() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return false;

        try {
          const context = new AudioContextClass();
          const now = context.currentTime;
          const gain = context.createGain();
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.18, now + 0.025);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
          gain.connect(context.destination);

          [880, 1320].forEach((frequency, index) => {
            const osc = context.createOscillator();
            osc.type = "sine";
            osc.frequency.setValueAtTime(frequency, now + index * 0.08);
            osc.connect(gain);
            osc.start(now + index * 0.08);
            osc.stop(now + 0.36);
          });

          setTimeout(() => context.close && context.close(), 520);
          return true;
        } catch (error) {
          return false;
        }
      }

      function notifySaved() {
        if (!playSaveChime()) speakText("Guardado");
      }

      function getSupportedAudioMimeType() {
        if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return "";
        const types = [
          "audio/webm;codecs=opus",
          "audio/webm",
          "audio/ogg;codecs=opus",
          "audio/mp4"
        ];
        return types.find((type) => MediaRecorder.isTypeSupported(type)) || "";
      }

      function blobToDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(reader.error || new Error("audio invalido"));
          reader.readAsDataURL(blob);
        });
      }

      async function openCameraMode() {
        if (!state.config) {
          setSetupStatus("introduce PIN");
          return;
        }

        showCamera();
        state.photoDataUrl = "";
        clearCameraLongTap();
        state.ignoreNextCameraTap = false;
        setCameraSaving(false);
        photoPreview.removeAttribute("src");
        cameraPanel.classList.remove("captured");
        cameraBadge.textContent = "preview";
        cameraHint.textContent = "side foto";
        setCameraStatus("abriendo camara...");

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setCameraStatus("camara no disponible");
          return;
        }

        try {
          await stopCameraStream();
          state.cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
          });
          cameraVideo.srcObject = state.cameraStream;
          await cameraVideo.play();
          setCameraStatus("boton lateral: foto");
        } catch (error) {
          setCameraStatus("camara denegada");
        }
      }

      async function stopCameraStream() {
        if (state.cameraStream) {
          state.cameraStream.getTracks().forEach((track) => track.stop());
          state.cameraStream = null;
        }
        cameraVideo.srcObject = null;
      }

      async function closeCameraMode() {
        await stopCameraStream();
        state.photoDataUrl = "";
        clearCameraLongTap();
        state.ignoreNextCameraTap = false;
        setCameraSaving(false);
        photoPreview.removeAttribute("src");
        cameraPanel.classList.remove("captured");
        if (state.config) {
          showChat();
          setChatStatus("mantén PTT");
        } else {
          showSetup();
        }
      }

      function capturePhoto() {
        if (state.mode !== "camera" || state.photoDataUrl || state.cameraSaving) return;
        if (!cameraVideo.videoWidth || !cameraVideo.videoHeight) {
          setCameraStatus("sin preview");
          return;
        }

        state.ignoreNextCameraTap = false;
        const canvas = document.createElement("canvas");
        const maxWidth = 960;
        const scale = Math.min(1, maxWidth / cameraVideo.videoWidth);
        canvas.width = Math.max(1, Math.round(cameraVideo.videoWidth * scale));
        canvas.height = Math.max(1, Math.round(cameraVideo.videoHeight * scale));
        const context = canvas.getContext("2d");
        context.drawImage(cameraVideo, 0, 0, canvas.width, canvas.height);
        state.photoDataUrl = canvas.toDataURL("image/jpeg", 0.82);
        photoPreview.src = state.photoDataUrl;
        cameraPanel.classList.add("captured");
        cameraBadge.textContent = "foto";
        cameraHint.textContent = "tap guarda / long tap borra";
        setCameraStatus("foto lista");
      }

      function clearCameraLongTap() {
        if (!state.cameraLongTapTimer) return;
        clearTimeout(state.cameraLongTapTimer);
        state.cameraLongTapTimer = null;
      }

      function clearPhoto() {
        if (state.mode !== "camera" || !state.photoDataUrl || state.cameraSaving) return;
        clearCameraLongTap();
        state.photoDataUrl = "";
        photoPreview.removeAttribute("src");
        cameraPanel.classList.remove("captured");
        setCameraSaving(false);
        cameraBadge.textContent = "preview";
        cameraHint.textContent = "side foto";
        setCameraStatus("borrada");
      }

      async function savePhoto() {
        if (state.mode !== "camera" || state.cameraSaving) return;
        if (!state.photoDataUrl) {
          setCameraStatus("haz foto primero");
          return;
        }
        if (!state.config) {
          showSetup();
          return;
        }

        clearCameraLongTap();
        ensureSessionId();
        setCameraSaving(true);
        setCameraStatus("guardando...");
        const imageBase64 = state.photoDataUrl.includes(",") ? state.photoDataUrl.split(",").pop() : state.photoDataUrl;
        const payload = {
          token: state.config.token,
          message: "",
          inputMode: "image",
          imageBase64,
          imageMimeType: "image/jpeg",
          imageName: "rabbit-r1-photo.jpg",
          lang: state.config.lang || "es-ES",
          sessionId: state.sessionId,
          source: "rabbit-r1-creation",
          sentAt: new Date().toISOString()
        };

        try {
          const response = await fetch(state.config.endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: new URLSearchParams({ payload: JSON.stringify(payload) })
          });

          const raw = await response.text();
          let data = raw;
          try {
            data = raw ? JSON.parse(raw) : {};
          } catch (error) {
            data = raw || { reply: `HTTP ${response.status}` };
          }

          if (response.status === 401 || response.status === 403 || isRevoked(data)) {
            setCameraSaving(false);
            await revokeLocalConfig();
            return;
          }

          if (!response.ok) {
            setCameraSaving(false);
            setCameraStatus(`HTTP ${response.status}`);
            return;
          }

          const reply = extractReply(data);
          addMessage("bot", reply);
          notifySaved();
          await closeCameraMode();
          setChatStatus("mantén PTT");
        } catch (error) {
          setCameraSaving(false);
          setCameraStatus("fallo de red");
        }
      }

      function handleCameraTap() {
        if (state.mode !== "camera" || state.cameraSaving) return;

        if (state.ignoreNextCameraTap) {
          state.ignoreNextCameraTap = false;
          return;
        }

        if (!state.photoDataUrl) {
          setCameraStatus("boton lateral: foto");
          return;
        }

        savePhoto();
      }

      function handleCameraPointerDown() {
        if (state.mode !== "camera" || !state.photoDataUrl || state.cameraSaving) return;
        clearCameraLongTap();
        state.ignoreNextCameraTap = false;
        state.cameraLongTapTimer = setTimeout(() => {
          state.cameraLongTapTimer = null;
          state.ignoreNextCameraTap = true;
          clearPhoto();
        }, 560);
      }

      function handleCameraPointerEnd() {
        clearCameraLongTap();
      }

      function initCameraShake() {
        if (!window.creationSensors || !window.creationSensors.accelerometer) return;

        let previous = null;
        window.creationSensors.accelerometer.start((data) => {
          if (state.mode !== "camera" || !state.photoDataUrl) {
            previous = data;
            return;
          }

          if (!previous) {
            previous = data;
            return;
          }

          const dx = Number(data.x || 0) - Number(previous.x || 0);
          const dy = Number(data.y || 0) - Number(previous.y || 0);
          const dz = Number(data.z || 0) - Number(previous.z || 0);
          const delta = Math.sqrt(dx * dx + dy * dy + dz * dz);
          previous = data;

          const now = Date.now();
          if (delta > 18 && now - state.lastShakeAt > 800) {
            state.lastShakeAt = now;
            clearPhoto();
          }
        }, { frequency: 30 });
      }

      async function startVoice() {
        if (state.listening) return;
        if (state.mode !== "chat") return;
        if (!state.config) {
          setSetupStatus("introduce PIN");
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder) {
          setChatStatus("micro no disponible");
          addMessage("system", "Grabacion no soportada aqui. Escribe el texto.");
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          const mimeType = getSupportedAudioMimeType();
          state.audioChunks = [];
          state.audioMimeType = mimeType || "audio/webm";
          state.recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);

          state.recorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) state.audioChunks.push(event.data);
          };

          state.recorder.onerror = () => {
            setChatStatus("error micro");
            state.listening = false;
            setListeningVisual(false);
            stream.getTracks().forEach((track) => track.stop());
          };

          state.recorder.onstop = async () => {
            state.listening = false;
            setListeningVisual(false);
            stream.getTracks().forEach((track) => track.stop());

            const blob = new Blob(state.audioChunks, { type: state.audioMimeType });
            state.audioChunks = [];

            if (!blob.size) {
              setChatStatus("audio vacio");
              return;
            }

            await sendVoiceBlob(blob);
          };

          state.recorder.start();
          state.listening = true;
          setListeningVisual(true);
          setChatStatus("grabando...");
        } catch (error) {
          setListeningVisual(false);
          setChatStatus("micro denegado");
        }
      }

      function stopVoice() {
        if (!state.recorder || !state.listening) return;
        setListeningVisual(false);
        setChatStatus("subiendo audio...");
        state.recorder.stop();
      }

      function toggleVoice() {
        if (state.listening) {
          stopVoice();
        } else {
          startVoice();
        }
      }

      async function revokeLocalConfig() {
        await removeStored(CONFIG_KEY, true);
        state.config = null;
        state.history = [];
        await setStored(HISTORY_KEY, state.history);
        setSetupStatus("token revocado");
        showSetup();
      }

      async function sendMessage(text, inputMode = "text") {
        if (!state.config) {
          showSetup();
          return;
        }

        const message = String(text || "").trim();
        if (!message) return;

        ensureSessionId();
        addMessage(inputMode === "voice" ? "voice" : "user", message);
        setChatStatus("enviando...");

        const payload = {
          token: state.config.token,
          message,
          inputMode,
          sessionId: state.sessionId,
          source: "rabbit-r1-creation",
          sentAt: new Date().toISOString()
        };

        try {
          const response = await fetch(state.config.endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: new URLSearchParams({ payload: JSON.stringify(payload) })
          });

          const raw = await response.text();
          let data = raw;

          try {
            data = raw ? JSON.parse(raw) : {};
          } catch (error) {
            data = raw || { reply: `HTTP ${response.status}` };
          }

          if (response.status === 401 || response.status === 403 || isRevoked(data)) {
            addMessage("system", "Token revocado. Reconfigura la app.");
            await revokeLocalConfig();
            return;
          }

          if (!response.ok) {
            addMessage("system", `n8n respondio HTTP ${response.status}`);
            setChatStatus(`HTTP ${response.status}`);
            return;
          }

          const reply = extractReply(data);
          state.lastReply = reply;
          addMessage("bot", reply);
          notifySaved();
          setChatStatus("respuesta lista");
        } catch (error) {
          addMessage("system", "No se pudo conectar con n8n.");
          setChatStatus("fallo de red");
        }
      }

      async function sendVoiceBlob(blob) {
        if (!state.config) {
          showSetup();
          return;
        }

        ensureSessionId();
        addMessage("voice", "Audio enviado para transcripcion.");
        setChatStatus("transcribiendo...");

        try {
          const dataUrl = await blobToDataUrl(blob);
          const audioBase64 = dataUrl.includes(",") ? dataUrl.split(",").pop() : dataUrl;
          const payload = {
            token: state.config.token,
            message: "",
            inputMode: "audio",
            audioBase64,
            audioMimeType: blob.type || state.audioMimeType || "audio/webm",
            audioName: "rabbit-r1.webm",
            lang: state.config.lang || "es-ES",
            sessionId: state.sessionId,
            source: "rabbit-r1-creation",
            sentAt: new Date().toISOString()
          };

          const response = await fetch(state.config.endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: new URLSearchParams({ payload: JSON.stringify(payload) })
          });

          const raw = await response.text();
          let data = raw;

          try {
            data = raw ? JSON.parse(raw) : {};
          } catch (error) {
            data = raw || { reply: `HTTP ${response.status}` };
          }

          if (response.status === 401 || response.status === 403 || isRevoked(data)) {
            addMessage("system", "Token revocado. Reconfigura la app.");
            await revokeLocalConfig();
            return;
          }

          if (!response.ok) {
            addMessage("system", `n8n respondio HTTP ${response.status}`);
            setChatStatus(`HTTP ${response.status}`);
            return;
          }

          if (data.transcript) addMessage("user", data.transcript);
          const reply = extractReply(data);
          state.lastReply = reply;
          addMessage("bot", reply);
          notifySaved();
          setChatStatus("respuesta lista");
        } catch (error) {
          addMessage("system", "No se pudo conectar con n8n.");
          setChatStatus("fallo de red");
        }
      }

      async function resetConfig() {
        await revokeLocalConfig();
      }

      function handleSideClick() {
        if (state.mode === "camera") {
          if (state.cameraSaving) return;
          if (!state.photoDataUrl) {
            capturePhoto();
          } else {
            savePhoto();
          }
          return;
        }

        if (state.mode !== "chat") return;

        const now = Date.now();
        if (now - state.lastSideClickAt < 450) {
          state.lastSideClickAt = 0;
          openCameraMode();
          return;
        }

        state.lastSideClickAt = now;
        setChatStatus("doble tap: camara");
      }

      function handleLongPressStart() {
        if (state.mode === "camera") {
          if (state.cameraSaving) return;
          if (state.photoDataUrl) {
            clearPhoto();
          } else {
            closeCameraMode();
          }
          return;
        }

        startVoice();
      }

      function handleLongPressEnd() {
        if (state.mode !== "chat") return;
        stopVoice();
      }

      keypad.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-key]");
        if (!button) return;
        pressPinKey(button.dataset.key || "");
      });

      cameraPanel.addEventListener("click", handleCameraTap);
      cameraPanel.addEventListener("pointerdown", handleCameraPointerDown);
      cameraPanel.addEventListener("pointerup", handleCameraPointerEnd);
      cameraPanel.addEventListener("pointercancel", handleCameraPointerEnd);
      cameraPanel.addEventListener("pointerleave", handleCameraPointerEnd);
      window.addEventListener("sideClick", handleSideClick);
      window.addEventListener("longPressStart", handleLongPressStart);
      window.addEventListener("longPressEnd", handleLongPressEnd);

      async function boot() {
        state.config = null;
        state.history = await getStored(HISTORY_KEY, []);
        state.sessionId = await getStored(SESSION_KEY, "");
        initCameraShake();
        showSetup();
      }

      boot();
    </script>
  </body>
</html>
