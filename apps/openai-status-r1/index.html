<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=240, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>OpenAI Status R1</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 240px;
        height: 282px;
        margin: 0;
        overflow: hidden;
        background: #101114;
        color: #f5f0e8;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        border: 4px solid #f6b94b;
      }

      button {
        font: inherit;
      }

      main {
        width: 100%;
        height: 100%;
        padding: 6px 8px 7px;
      }

      .view {
        display: none;
        width: 100%;
        height: 100%;
      }

      .view.active {
        display: grid;
      }

      #setupView,
      #statusView {
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 5px;
      }

      header {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 7px;
      }

      h1 {
        margin: 0;
        min-width: 0;
        color: #f5f0e8;
        font-size: 16px;
        line-height: 1;
        letter-spacing: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .badge {
        max-width: 86px;
        height: 22px;
        padding: 0 6px;
        border: 1px solid #725f39;
        border-radius: 5px;
        display: grid;
        place-items: center;
        background: #1b1d22;
        color: #f6b94b;
        font-size: 10px;
        font-weight: 900;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .panel {
        min-height: 0;
        border: 1px solid #725f39;
        border-radius: 7px;
        background: #181a1f;
        overflow: hidden;
      }

      .pinPanel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 6px;
        padding: 7px;
      }

      .pinLabel {
        color: #c5a666;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .pinDisplay {
        height: 32px;
        border: 1px solid #725f39;
        border-radius: 6px;
        background: #0f1013;
        color: #f5f0e8;
        display: grid;
        place-items: center;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: 4px;
      }

      .keypad {
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, minmax(0, 1fr));
        gap: 5px;
      }

      .key {
        min-height: 0;
        border: 1px solid #725f39;
        border-radius: 6px;
        background: #24272e;
        color: #f5f0e8;
        font-size: 16px;
        font-weight: 900;
      }

      .key.primary {
        background: #f6b94b;
        color: #101114;
      }

      .statusPanel {
        display: grid;
        grid-template-rows: auto auto auto minmax(0, 1fr);
        gap: 7px;
        padding: 9px;
      }

      .remaining {
        min-width: 0;
      }

      .label {
        margin: 0 0 3px;
        color: #c5a666;
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .amount {
        margin: 0;
        color: #f6b94b;
        font-size: 34px;
        line-height: 0.95;
        font-weight: 950;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .amount.small {
        font-size: 22px;
      }

      .bar {
        height: 12px;
        border: 1px solid #725f39;
        border-radius: 4px;
        background: #0f1013;
        overflow: hidden;
      }

      .barFill {
        width: 0%;
        height: 100%;
        background: #2fd17c;
      }

      .barFill.warn {
        background: #f6b94b;
      }

      .barFill.danger {
        background: #ff5b5b;
      }

      .metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .metric {
        min-width: 0;
        padding: 6px;
        border: 1px solid #39312a;
        border-radius: 6px;
        background: #101114;
      }

      .metric strong,
      .metric span {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .metric strong {
        margin-bottom: 2px;
        color: #f5f0e8;
        font-size: 13px;
        line-height: 1;
      }

      .metric span {
        color: #c5a666;
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .note {
        margin: 0;
        min-height: 0;
        color: #c9c3b7;
        font-size: 11px;
        line-height: 1.18;
        overflow: hidden;
      }

      .status {
        min-height: 13px;
        color: #c5a666;
        font-size: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="view active" id="setupView">
        <header>
          <h1>OpenAI $</h1>
          <span class="badge">setup</span>
        </header>

        <section class="panel pinPanel">
          <div>
            <div class="pinLabel">PIN</div>
            <div class="pinDisplay" id="pinDisplay">----</div>
          </div>

          <div class="keypad" id="keypad">
            <button class="key" data-key="1">1</button>
            <button class="key" data-key="2">2</button>
            <button class="key" data-key="3">3</button>
            <button class="key" data-key="4">4</button>
            <button class="key" data-key="5">5</button>
            <button class="key" data-key="6">6</button>
            <button class="key" data-key="7">7</button>
            <button class="key" data-key="8">8</button>
            <button class="key" data-key="9">9</button>
            <button class="key" data-key="clear">C</button>
            <button class="key" data-key="0">0</button>
            <button class="key primary" data-key="back">&lt;</button>
          </div>
        </section>

        <footer>
          <div class="status" id="setupStatus">sin configurar</div>
        </footer>
      </section>

      <section class="view" id="statusView">
        <header>
          <h1>OpenAI $</h1>
          <span class="badge" id="statusBadge">actualizando</span>
        </header>

        <section class="panel statusPanel" id="statusPanel">
          <div class="remaining">
            <p class="label">restante estimado</p>
            <p class="amount" id="remainingAmount">--</p>
          </div>

          <div class="bar">
            <div class="barFill" id="barFill"></div>
          </div>

          <div class="metrics">
            <div class="metric">
              <strong id="spentAmount">--</strong>
              <span>gastado mes</span>
            </div>
            <div class="metric">
              <strong id="budgetAmount">--</strong>
              <span>budget</span>
            </div>
            <div class="metric">
              <strong id="dailyAmount">--</strong>
              <span>media dia</span>
            </div>
            <div class="metric">
              <strong id="etaAmount">--</strong>
              <span>se acaba</span>
            </div>
          </div>

          <p class="note" id="statusNote">Tap o boton lateral para refrescar.</p>
        </section>

        <footer>
          <div class="status" id="statusLine">conectando...</div>
        </footer>
      </section>
    </main>

    <script>
      const CONFIG_BOOTSTRAP_ENDPOINT = "https://n8n.calvonavarro.com/webhook/rabbit-r1-config-pin";
      const PIN_LENGTH = 4;

      const state = {
        pin: "",
        config: null,
        loading: false,
        loadingTimer: null
      };

      const setupView = document.getElementById("setupView");
      const statusView = document.getElementById("statusView");
      const keypad = document.getElementById("keypad");
      const pinDisplay = document.getElementById("pinDisplay");
      const setupStatus = document.getElementById("setupStatus");
      const statusBadge = document.getElementById("statusBadge");
      const statusPanel = document.getElementById("statusPanel");
      const remainingAmount = document.getElementById("remainingAmount");
      const spentAmount = document.getElementById("spentAmount");
      const budgetAmount = document.getElementById("budgetAmount");
      const dailyAmount = document.getElementById("dailyAmount");
      const etaAmount = document.getElementById("etaAmount");
      const barFill = document.getElementById("barFill");
      const statusNote = document.getElementById("statusNote");
      const statusLine = document.getElementById("statusLine");

      function updatePinDisplay() {
        pinDisplay.textContent = state.pin.padEnd(PIN_LENGTH, "-");
      }

      function setLoading(isLoading) {
        state.loading = isLoading;
        if (state.loadingTimer) {
          clearInterval(state.loadingTimer);
          state.loadingTimer = null;
        }

        if (!isLoading) return;

        let dots = 0;
        const tick = () => {
          dots = (dots + 1) % 4;
          const text = `actualizando${".".repeat(dots || 3)}`;
          statusBadge.textContent = "sync";
          statusLine.textContent = text;
        };
        tick();
        state.loadingTimer = setInterval(tick, 360);
      }

      function money(value, currency = "USD") {
        const number = Number(value);
        if (!Number.isFinite(number)) return "--";
        return new Intl.NumberFormat("es-ES", {
          style: "currency",
          currency: String(currency || "USD").toUpperCase(),
          maximumFractionDigits: number >= 100 ? 0 : 2
        }).format(number);
      }

      function shortDate(value) {
        if (!value) return "--";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "--";
        return new Intl.DateTimeFormat("es-ES", { day: "2-digit", month: "short" }).format(date);
      }

      function showSetup() {
        setupView.classList.add("active");
        statusView.classList.remove("active");
      }

      function showStatus() {
        setupView.classList.remove("active");
        statusView.classList.add("active");
      }

      async function fetchConfigByPin() {
        setupStatus.textContent = "conectando...";

        try {
          const response = await fetch(CONFIG_BOOTSTRAP_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: new URLSearchParams({ payload: JSON.stringify({ pin: state.pin, app: "openai-status" }) })
          });

          const raw = await response.text();
          const data = raw ? JSON.parse(raw) : {};
          if (!response.ok || data.revoked || data.status === "revoked" || data.error) {
            throw new Error(data.reply || data.error || `HTTP ${response.status}`);
          }

          state.config = data.config || data;
          showStatus();
          await refreshStatus();
        } catch (error) {
          state.pin = "";
          updatePinDisplay();
          setupStatus.textContent = error.message || "PIN invalido";
        }
      }

      async function refreshStatus() {
        if (!state.config || state.loading) return;
        setLoading(true);

        try {
          const response = await fetch(state.config.endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: new URLSearchParams({
              payload: JSON.stringify({
                token: state.config.token,
                source: "rabbit-r1-openai-status",
                sentAt: new Date().toISOString()
              })
            })
          });

          const raw = await response.text();
          let data = raw ? JSON.parse(raw) : {};

          if (response.status === 401 || response.status === 403 || data.revoked || data.status === "revoked") {
            state.config = null;
            setLoading(false);
            showSetup();
            setupStatus.textContent = "token revocado";
            return;
          }

          if (!response.ok || data.error || data.ok === false) {
            throw new Error(data.reply || data.error || `HTTP ${response.status}`);
          }

          renderStatus(data);
        } catch (error) {
          statusBadge.textContent = "error";
          statusLine.textContent = "fallo";
          statusNote.textContent = error.message || "No se pudo conectar con n8n.";
        } finally {
          setLoading(false);
        }
      }

      function renderStatus(data) {
        const currency = data.currency || "USD";
        const spent = Number(data.spentUsd ?? data.spent ?? 0);
        const budget = Number(data.budgetUsd ?? data.budget ?? 0);
        const remaining = Number(data.remainingUsd ?? budget - spent);
        const percent = budget > 0 ? Math.max(0, Math.min(100, (spent / budget) * 100)) : 0;
        const days = Number(data.daysUntilEmpty);

        remainingAmount.textContent = budget > 0 ? money(remaining, currency) : "sin budget";
        remainingAmount.classList.toggle("small", budget <= 0);
        spentAmount.textContent = money(spent, currency);
        budgetAmount.textContent = budget > 0 ? money(budget, currency) : "n8n";
        dailyAmount.textContent = money(data.dailyAverageUsd, currency);
        etaAmount.textContent = Number.isFinite(days) ? `${Math.max(0, Math.ceil(days))}d` : shortDate(data.depletionDate);

        barFill.style.width = `${percent}%`;
        barFill.className = `barFill${percent >= 90 ? " danger" : percent >= 70 ? " warn" : ""}`;

        statusBadge.textContent = `${Math.round(percent)}%`;
        statusLine.textContent = data.updatedAt ? `upd ${shortDate(data.updatedAt)}` : "actualizado";
        statusNote.textContent = data.reply || "Tap o boton lateral para refrescar.";
      }

      keypad.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-key]");
        if (!button) return;

        const key = button.dataset.key;
        if (key === "clear") {
          state.pin = "";
        } else if (key === "back") {
          state.pin = state.pin.slice(0, -1);
        } else if (/^\d$/.test(key) && state.pin.length < PIN_LENGTH) {
          state.pin += key;
        }

        updatePinDisplay();
        setupStatus.textContent = state.pin.length ? "marcando..." : "sin configurar";
        if (state.pin.length === PIN_LENGTH) fetchConfigByPin();
      });

      statusPanel.addEventListener("click", refreshStatus);
      window.addEventListener("sideClick", refreshStatus);

      window.addEventListener("longPressStart", () => {
        state.pin = "";
        state.config = null;
        updatePinDisplay();
        setLoading(false);
        showSetup();
        setupStatus.textContent = "bloqueado";
      });

      updatePinDisplay();
    </script>
  </body>
</html>
