<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rabbit R1 QR</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f4ef;
        color: #171717;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(1040px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.05;
      }

      p {
        margin: 0 0 28px;
        color: #555;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
      }

      article {
        border: 1px solid #d7d1c7;
        border-radius: 8px;
        padding: 18px;
        background: #fff;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      img {
        display: block;
        width: 100%;
        max-width: 320px;
        height: auto;
        margin: 0 auto 14px;
        image-rendering: pixelated;
      }

      a {
        color: #171717;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Rabbit R1 QR</h1>
      <p>Escanea desde r1 creations > add via QR code.</p>

      <section class="grid">
        <article>
          <h2>Ruleta chorra</h2>
          <img src="./fortune-wheel.png" alt="QR Ruleta chorra" />
          <a href="../apps/fortune-wheel/">Abrir app</a>
        </article>

        <article>
          <h2>ExcusaBot</h2>
          <img src="./excuse-bot.png" alt="QR ExcusaBot" />
          <a href="../apps/excuse-bot/">Abrir app</a>
        </article>

        <article>
          <h2>Instantsfun R1</h2>
          <img src="./instantsfun-r1.png" alt="QR Instantsfun R1" />
          <a href="../apps/instantsfun-r1/">Abrir app</a>
        </article>
      </section>
    </main>
  </body>
</html>
